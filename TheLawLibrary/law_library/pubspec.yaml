name: law_library
description: A modern law library app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  http: ^1.4.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6
  mysql1: ^0.20.0
  path_provider: ^2.1.5
  flutter_slidable: ^4.0.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.2.3
  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1
  logger: ^2.0.2+1
  video_player: ^2.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true  
  
  assets:
    - assets/

  fonts:
    - family: SF Pro
      fonts:
        - asset: assets/fonts/SFPRODISPLAYREGULAR.OTF
        - asset: assets/fonts/SFPRODISPLAYMEDIUM.OTF
          weight: 500
        - asset: assets/fonts/SFPRODISPLAYBOLD.OTF
          weight: 700
