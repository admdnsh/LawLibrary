name: law_library
description: A modern law library app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 🌍 Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # 🎨 UI & State
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  google_fonts: ^8.0.0
  flutter_svg: ^2.1.0
  flutter_slidable: ^4.0.0
  dropdown_search: ^6.0.2
  flutter_animate: ^4.2.3

  # 💾 Storage & Data
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.5
  sqflite: ^2.4.1

  # 🌐 Network & Backend
  http: ^1.4.0
  mysql1: ^0.20.0
  crypto: ^3.0.6

  # 🖼 Media
  cached_network_image: ^3.4.1
  video_player: ^2.8.3

  # 🧪 Utils
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Enables gen-l10n
  generate: true

  assets:
    - assets/

  fonts:
    - family: SF Pro
      fonts:
        - asset: assets/fonts/SFPRODISPLAYREGULAR.OTF
        - asset: assets/fonts/SFPRODISPLAYMEDIUM.OTF
          weight: 500
        - asset: assets/fonts/SFPRODISPLAYBOLD.OTF
          weight: 700
